8">Global Verification</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.3062" x="715.7095" y="4771.6523">Unlike /check (per-task gate),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.0625" x="715.7095" y="4786.9629">/release runs cross-story</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.437" x="715.7095" y="4802.2734">integration and full E2E suite.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.4873" x="715.7095" y="4817.584">Catches issues that isolated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.291" x="715.7095" y="4832.8945">per-story testing missed.</text><line style="stroke:#333333;stroke-width:1;" x1="709.7095" x2="925.2017" y1="4840.6367" y2="4840.6367"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="715.7095" y="4858.2051">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="768.0776" y="4858.2051">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="44.6113" x="865.5903" y="4858.2051">release</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130.1968" x="715.7095" y="4873.5156">notes + G4 evidence</text><rect fill="#DFF7E1" height="233.7266" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="276.2598" x="413.4497" y="4693.1523"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="168.5566" x="423.4497" y="4714.7539">P8-P10: Release Hardening</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.1563" x="595.8032" y="4714.7539">-- /release</text><line style="stroke:#333333;stroke-width:1;" x1="413.4497" x2="689.7095" y1="4722.2852" y2="4722.2852"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="423.4497" y="4738.8867">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.0957" x="474.0278" y="4738.8867">Type</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="57.7969" x="505.9204" y="4738.5879">/release</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.9648" x="567.5142" y="4738.8867">in IDE chat.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.5449" x="423.4497" y="4753.0195">All PRD stories must be Done first.</text><line style="stroke:#333333;stroke-width:1;" x1="413.4497" x2="689.7095" y1="4760.5508" y2="4760.5508"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="423.4497" y="4777.1523">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.8027" x="466.7388" y="4777.1523">Updates PROGRESS.md phase to</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.6406" x="423.4497" y="4791.2852">P8. Runs global integration checks and</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="215.4844" x="423.4497" y="4805.418">E2E tests (cross-story, not per-task).</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="221.0742" x="423.4497" y="4819.5508">Fixes regressions found during global</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="215.9648" x="423.4497" y="4833.6836">sweep. Drafts release notes + known</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="256.2598" x="423.4497" y="4847.8164">issues + deployment runbook in PROGRESS.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="232.1074" x="423.4497" y="4861.9492">Optionally asks for manual E2E sign-off</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="221.168" x="423.4497" y="4876.082">at P10 (smoke tests you run yourself).</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="225.1992" x="423.4497" y="4890.2148">Records G4 evidence in PROGRESS.md.</text><line style="stroke:#333333;stroke-width:1;" x1="413.4497" x2="689.7095" y1="4897.7461" y2="4897.7461"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="182.9473" x="423.4497" y="4914.3477">-&gt; PROGRESS.md release notes</text><rect fill="#FFF2CC" height="48.2656" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="219.0078" x="442.0757" y="4946.8789"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="185.2617" x="452.0757" y="4968.4805">Gate G4 -- Release Candidate</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="199.0078" x="452.0757" y="4982.6133">(hardening complete + E2E green)</text><path d="M183.8306,5067.832 L183.8306,5210.3164 A0,0 0 0 0 183.8306,5210.3164 L400.6685,5210.3164 A0,0 0 0 0 400.6685,5210.3164 L400.6685,5143.0742 L420.6685,5139.0742 L400.6685,5135.0742 L400.6685,5077.832 L390.6685,5067.832 L183.8306,5067.832 A0,0 0 0 0 183.8306,5067.832" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M390.6685,5067.832 L390.6685,5077.832 L400.6685,5077.832 L390.6685,5067.832" 