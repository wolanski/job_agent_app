"#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="167.9272" x="448.0593" y="98.0332">Human Operator Journey</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.959" x="448.0593" y="113.3438">(Post-Ideation Development)</text><line style="stroke:#333333;stroke-width:1;" x1="442.0593" x2="661.0999" y1="121.0859" y2="121.0859"/><line style="stroke:#333333;stroke-width:1;" x1="442.0593" x2="661.0999" y1="123.0859" y2="123.0859"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="84.0811" x="448.0593" y="138.6543">Prerequisite:</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="164.3599" x="448.0593" y="153.4634">IDEATION_PROCESS.puml</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.4922" x="448.0593" y="169.0977">completed (Gate G0 passed).</text><line style="stroke:#333333;stroke-width:1;" x1="442.0593" x2="661.0999" y1="176.8398" y2="176.8398"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="96.7827" x="448.0593" y="194.4082">Truth Sources:</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="109.5732" x="448.0593" y="209.395">product/PRD.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="51.1431" x="561.7458" y="209.7188">= scope</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="117.3999" x="448.0593" y="224.7056">product/ARCH.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="41.6724" x="569.5725" y="225.0293">= arch</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="148.7065" x="448.0593" y="240.0161">product/contracts/*</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="40.9741" x="600.8792" y="240.3398">= APIs</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="148.7065" x="448.0593" y="255.3267">process/PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="45.2207" x="600.8792" y="255.6504">= state</text><line style="stroke:#333333;stroke-width:1;" x1="442.0593" x2="661.0999" y1="263.3926" y2="263.3926"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="67.9263" x="448.0593" y="280.9609">Color Key:</text><text fill="#000000" filter="url(#bmh4x7i966rpi0)" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.6294" x="456.2859" y="296.2715">Human action</text><text fill="#000000" filter="url(#bmh4x7i966rpi1)" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="85.96" x="456.2859" y="311.582">Agent activity</text><text fill="#000000" filter="url(#bmh4x7i966rpi2)" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="92.5298" x="456.2859" y="326.8926">Artifact output</text><text fill="#000000" filter="url(#bmh4x7i966rpi3)" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="85.3379" x="456.2859" y="342.2031">Decision gate</text><text fill="#000000" filter="url(#bmh4x7i966rpi4)" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="67.8057" x="456.2859" y="357.5137">Phase gate</text><text fill="#000000" filter="url(#bmh4x7i966rpi5)" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="63.1211" x="456.2859" y="372.8242">Escalation</text><line style="stroke:#333333;stroke-width:1;" x1="442.0593" x2="661.0999" y1="380.5664" y2="380.5664"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="96.1987" x="448.0593" y="398.1348">All Workflows:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.5107" x="448.0593" y="413.4453">/seed /plan /explore /advise</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167.229" x="448.0593" y="428.7559">/next /check /ccr /release</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.9526" x="448.0593" y="444.0664">/archive /help</text><ellipse cx="551.5796" cy="471.8086" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#FFF2CC" height="138.9297" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="228.3594" x="437.3999" y="501.8086"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="125.3027" x="447.3999" y="523.4102">Gate G0 -- Installed</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.7031" x="447.3999" y="537.543">(from IDEATION_PROCESS.puml)</text><line style="stroke:#333333;stroke-width:1;" x1="437.3999" x2="665.7593" y1="545.0742" y2="545.0742"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="165.1113" x="447.3999" y="561.6758">Artifacts committed to repo.</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="72.2461" x="447.3999" y="575.5098">make&#160;check</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="66.7266" x="523.4429" y="575.8086">runs green.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.3594" x="447.3999" y="589.9414">Agent activated as Process Steward.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="179.332" x="447.3999" y="604.0742">PROGRESS.md initialized at P0.</text><line style="stroke:#333333;stroke-width:1;" x1="437.3999" x2="665.7593" y1="611.6055" y2="611.6055"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="158.9414" x="447.3999" y="628.207">Continues: Phase A (P1-P4)</text><rect fill="#E8F4FD" height="1779.8672" style="stroke:#999999;stroke-width:1.5;" width="1095.1592" x="11" y="650.7383"/><path d="M378.7314,650.7383 L378.7314,676.7148 L368.7314,686.7148 L11,686.7148" fill="none" style="stroke:#999999;stroke-width:1.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="248.0762" x="14" y="665.2734">PHASE A: COLLABORATIVE DESIGN</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.3877" x="266.5059" y="665.2734">(P1-P4)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="357.7314" x="14" y="681.7617">ARCH and contracts are DRAFTS -- freely modifiable</text><path d="M712.7065,749.3359 L712.7065,816.5781 L692.7065,820.5781 L712.7065,824.5781 L712.7065,891.8203 A0,0 0 0 0 712.7065,891.8203 L955.3984,891.8203 A0,0 0 0 0 955.3984,891.8203 L955.3984,759.3359 L945.3984,749.3359 L712.7065,749.3359 A0,0 0 0 0 712.7065,749.3359" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M945.3984,749.3359 L945.3984,759.3359 L955.3984,759.3359 L945.3984,749.3359" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="145.0884" x="718.7065" y="766.9043">Stories-first Principle</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.7959" x="718.7065" y="782.2148">Stories are the boundary between</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.6919" x="718.7065" y="797.5254">human intent and agent execution.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="188.3159" x="718.7065" y="812.8359">Each S-V### is a vertical slice</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.0264" x="718.7065" y="828.1465">deliverable in &lt;= 1 day.</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="47.5884" x="718.7065" y="843.457">INVEST</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.417" x="770.4082" y="843.457">criteria apply.</text><line style="stroke:#333333;stroke-width:1;" x1="712.7065" x2="955.3984" y1="851.1992" y2="851.1992"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="718.7065" y="868.7676">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="71.9697" x="771.0747" y="868.7676">PRD.md S4</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.7627" x="847.1577" y="868.7676">Backlog</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="10.334" x="718.7065" y="884.0781">+</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="733.1538" y="884.0781">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="71.2651" x="830.6665" y="884.0781">phase = P1</text><rect fill="#D9ECFF" height="233.7266" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="282.2539" x="410.4526" y="703.7148"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="112.7754" x="420.4526" y="725.3164">P1: Scope Framing</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.0723" x="537.0249" y="725.3164">-- /plan</text><line style="stroke:#333333;stroke-width:1;" x1="410.4526" x2="692.7065" y1="732.8477" y2="732.8477"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="420.4526" y="749.4492">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.0957" x="471.0308" y="749.4492">Type</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="36.123" x="502.9233" y="749.1504">/plan</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.9648" x="542.8433" y="749.4492">in IDE chat.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209.5605" x="420.4526" y="763.582">Provide your vision in PRD.md if not</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.9668" x="420.4526" y="777.7148">yet written. State priorities, MVP</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="196.957" x="420.4526" y="791.8477">boundaries, and hard constraints.</text><line style="stroke:#333333;stroke-width:1;" x1="410.4526" x2="692.7065" y1="799.3789" y2="799.3789"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="420.4526" y="815.9805">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="171.3281" x="463.7417" y="815.9805">Reads PRD.md vision section.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="217.1719" x="420.4526" y="830.1133">Drafts story backlog (S-V### entries)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="195.1172" x="420.4526" y="844.2461">with acceptance criteria, risk tags</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="262.2539" x="420.4526" y="858.3789">(LOW/MED/HIGH), Given/When/Then format.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="240.8672" x="420.4526" y="872.5117">Proposes functional grouping via UC tags</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.5352" x="420.4526" y="886.6445">(UC:SEARCH, UC:INGEST, UC:AUTH).</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.6172" x="420.4526" y="900.7773">Updates PROGRESS.md phase to P1.</text><line style="stroke:#333333;stroke-width:1;" x1="410.4526" x2="692.7065" y1="908.3086" y2="908.3086"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.4102" x="420.4526" y="924.9102">-&gt; product/PRD.md S4 (stories)</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="1057.1592" x="23" y="1007.8291"/><path d="M35,1092.9941 L35,1250.7891 A0,0 0 0 0 35,1250.7891 L248.8989,1250.7891 A0,0 0 0 0 248.8989,1250.7891 L248.8989,1175.8916 L268.8989,1171.8916 L248.8989,1167.8916 L248.8989,1102.9941 L238.8989,1092.9941 L35,1092.9941 A0,0 0 0 0 35,1092.9941" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M238.8989,1092.9941 L238.8989,1102.9941 L248.8989,1102.9941 L238.8989,1092.9941" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="121.9004" x="41" y="1110.5625">Pure Investigation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.6753" x="41" y="1125.873">/explore is a safe sandbox:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.0708" x="41" y="1141.1836">no code changes, no logged</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="160.4688" x="41" y="1156.4941">decisions. Use for spikes,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.0166" x="41" y="1171.8047">debugging, code audits,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.3467" x="41" y="1187.1152">"how does X work?" questions.</text><line style="stroke:#333333;stroke-width:1;" x1="35" x2="248.8989" y1="1194.8574" y2="1194.8574"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.8442" x="41" y="1212.4258">Output: Chat summary</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="66.2251" x="41" y="1227.7363">+ optional</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="38.3398" x="111.3384" y="1227.7363">I-###</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="80.1074" x="153.7915" y="1227.7363">in PROGRESS</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.9565" x="41" y="1243.0469">Feeds back to</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="36.3721" x="132.0698" y="1243.0469">/plan</text><rect fill="#DFF7E1" height="261.9922" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="275" x="268.8989" y="1040.8955"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="125.4082" x="278.8989" y="1062.4971">P1.a: Research Spike</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="68.0098" x="408.104" y="1062.4971">-- /explore</text><line style="stroke:#333333;stroke-width:1;" x1="268.8989" x2="543.8989" y1="1070.0283" y2="1070.0283"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="278.8989" y="1086.6299">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.0957" x="329.4771" y="1086.6299">Type</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="57.7969" x="361.3696" y="1086.3311">/explore</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.5762" x="422.9634" y="1086.6299">followed</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="164.9004" x="278.8989" y="1100.7627">by your question. Examples:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="221.127" x="278.8989" y="1114.8955">"Explore how cursor pagination works</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188.1973" x="278.8989" y="1129.0283">with our schema" or "Investigate</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="206.1504" x="278.8989" y="1143.1611">available auth libraries for FastAPI."</text><line style="stroke:#333333;stroke-width:1;" x1="268.8989" x2="543.8989" y1="1150.6924" y2="1150.6924"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="278.8989" y="1167.2939">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.4375" x="322.188" y="1167.2939">Performs read-only research.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="224.0684" x="278.8989" y="1181.4268">Reads source code, docs, and external</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="218.9238" x="278.8989" y="1195.5596">references. Summarizes findings with</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="255" x="278.8989" y="1209.6924">evidence (code snippets, command output).</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="237.1699" x="278.8989" y="1223.8252">Logs actionable findings as Issue (I-###)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="244.3828" x="278.8989" y="1237.958">in PROGRESS.md. **No production code is</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="224.3848" x="278.8989" y="1252.0908">changed. No decisions are recorded.**</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.1133" x="278.8989" y="1266.2236">Feeds findings back to /plan scope.</text><line style="stroke:#333333;stroke-width:1;" x1="268.8989" x2="543.8989" y1="1273.7549" y2="1273.7549"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.4902" x="278.8989" y="1290.3564">-&gt; Findings summary in chat</text><path d="M838.4927,1092.9941 L838.4927,1167.8916 L818.4927,1171.8916 L838.4927,1175.8916 L838.4927,1250.7891 A0,0 0 0 0 838.4927,1250.7891 L1068.1592,1250.7891 A0,0 0 0 0 1068.1592,1250.7891 L1068.1592,1102.9941 L1058.1592,1092.9941 L838.4927,1092.9941 A0,0 0 0 0 838.4927,1092.9941" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M1058.1592,1092.9941 L1058.1592,1102.9941 L1068.1592,1102.9941 L1058.1592,1092.9941" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="155.2446" x="844.4927" y="1110.5625">Structured Alternatives</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="199.1196" x="844.4927" y="1125.873">Unlike /explore (research only),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.8706" x="844.4927" y="1141.1836">/advise always produces a</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="165.9468" x="844.4927" y="1156.4941">logged Decision (D-###)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1133" x="1010.4395" y="1156.4941">.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.5269" x="844.4927" y="1171.8047">Each option shows tradeoffs.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.4238" x="844.4927" y="1187.1152">Human makes the final call.</text><line style="stroke:#333333;stroke-width:1;" x1="838.4927" x2="1068.1592" y1="1194.8574" y2="1194.8574"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="844.4927" y="1212.4258">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="896.8608" y="1212.4258">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="41.9199" x="994.3735" y="1212.4258">D-###</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.2734" x="844.4927" y="1227.7363">+ may update ARCH/contracts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.6665" x="844.4927" y="1243.0469">(drafts in P0-P4, no CCR needed)</text><rect fill="#D9ECFF" height="276.125" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="246.5938" x="571.8989" y="1033.8291"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="142.2773" x="581.8989" y="1055.4307">P1.b: Decision Analysis</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="60.6387" x="727.9731" y="1055.4307">-- /advise</text><line style="stroke:#333333;stroke-width:1;" x1="571.8989" x2="818.4927" y1="1062.9619" y2="1062.9619"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="581.8989" y="1079.5635">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.0957" x="632.4771" y="1079.5635">Type</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="50.5723" x="664.3696" y="1079.2646">/advise</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="67.1953" x="718.7388" y="1079.5635">followed by</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="185.3672" x="581.8989" y="1093.6963">the decision context. Examples:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.5938" x="581.8989" y="1107.8291">"Advise: SQLite vs PostgreSQL for MVP"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.377" x="581.8989" y="1121.9619">or "Advise: monolith vs microservices."</text><line style="stroke:#333333;stroke-width:1;" x1="571.8989" x2="818.4927" y1="1129.4932" y2="1129.4932"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="581.8989" y="1146.0947">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.084" x="625.188" y="1146.0947">Presents</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="74.1621" x="678.0688" y="1146.0947">2-3 options</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.4473" x="756.0278" y="1146.0947">with:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="192.8086" x="581.8989" y="1160.2275">tradeoffs (complexity, cost, risk),</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="217.4473" x="581.8989" y="1174.3604">alignment with ARCH and PRD scope,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.2773" x="581.8989" y="1188.4932">scalability and maintenance impact.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="77.5898" x="581.8989" y="1202.626">Gives explicit</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="104.0391" x="663.2856" y="1202.626">recommendation</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="24.6504" x="771.1216" y="1202.626">with</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.5723" x="581.8989" y="1216.7588">rationale. Asks human to choose.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="73.6348" x="581.8989" y="1230.8916">After choice:</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="137.0684" x="659.3306" y="1230.8916">logs Decision (D-###)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="183.6328" x="581.8989" y="1245.0244">in PROGRESS.md with rationale.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="200.3379" x="581.8989" y="1259.1572">May update ARCH.md or contracts</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.7109" x="581.8989" y="1273.29">if the decision reshapes them.</text><line style="stroke:#333333;stroke-width:1;" x1="571.8989" x2="818.4927" y1="1280.8213" y2="1280.8213"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159.2695" x="581.8989" y="1297.4229">-&gt; D-### in PROGRESS.md</text><rect fill="#555555" height="6" rx="2.5" ry="2.5" style="stroke:#555555;stroke-width:1;" width="1057.1592" x="23" y="1329.9541"/><polygon fill="#F1F1F1" points="493.655,957.4414,609.5042,957.4414,621.5042,970.3965,609.5042,983.3516,493.655,983.3516,481.655,970.3965,493.655,957.4414" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="555.5796" y="993.9863">yes</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="115.8491" x="493.655" y="968.0762">Unknowns in domain,</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="84.5679" x="493.655" y="981.0313">tech, or design?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="621.5042" y="968.0762">no</text><polygon fill="#F1F1F1" points="551.5796,1355.9541,563.5796,1367.9541,551.5796,1379.9541,539.5796,1367.9541,551.5796,1355.9541" style="stroke:#333333;stroke-width:0.5;"/><path d="M718.4487,1459.1191 L718.4487,1534.0166 L698.4487,1538.0166 L718.4487,1542.0166 L718.4487,1616.9141 A0,0 0 0 0 718.4487,1616.9141 L940.8218,1616.9141 A0,0 0 0 0 940.8218,1616.9141 L940.8218,1469.1191 L930.8218,1459.1191 L718.4487,1459.1191 A0,0 0 0 0 718.4487,1459.1191" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M930.8218,1459.1191 L930.8218,1469.1191 L940.8218,1469.1191 L930.8218,1459.1191" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="140.3403" x="724.4487" y="1476.6875">Draft Phase Freedom</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="188.7158" x="724.4487" y="1491.998">ARCH and contracts are freely</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.6064" x="724.4487" y="1507.3086">editable during P0-P4. No CCR</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.3003" x="724.4487" y="1522.6191">required. Iterate as needed.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.0483" x="724.4487" y="1537.9297">Once approved at P4, they</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="49.4482" x="724.4487" y="1553.2402">become</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="43.437" x="778.0103" y="1553.2402">frozen</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="58.2588" x="825.5605" y="1553.2402">for build.</text><line style="stroke:#333333;stroke-width:1;" x1="718.4487" x2="940.8218" y1="1560.9824" y2="1560.9824"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="724.4487" y="1578.5508">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="99.5439" x="776.8169" y="1578.5508">ARCH.md S1-7</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="10.334" x="724.4487" y="1593.8613">+</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="69.4688" x="738.896" y="1593.8613">contracts/</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.0571" x="812.478" y="1593.8613">baseline</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="10.334" x="724.4487" y="1609.1719">+</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="738.896" y="1609.1719">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="89.4131" x="836.4087" y="1609.1719">D-### logged</text><rect fill="#DFF7E1" height="276.125" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="293.7383" x="404.7104" y="1399.9541"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="197.4551" x="414.7104" y="1421.5557">P2-P3: Architecture &amp; Contracts</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.0723" x="615.9624" y="1421.5557">-- /plan</text><line style="stroke:#333333;stroke-width:1;" x1="404.7104" x2="698.4487" y1="1429.0869" y2="1429.0869"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="414.7104" y="1445.6885">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.0332" x="465.2886" y="1445.6885">Review the agent's ARCH.md</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="222.5273" x="414.7104" y="1459.8213">draft and contracts baseline. Focus on</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="238.7461" x="414.7104" y="1473.9541">tech stack, conventions, boundaries, and</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="217.4063" x="414.7104" y="1488.0869">extension points. Use /advise for any</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="200.7246" x="414.7104" y="1502.2197">unresolved architectural tradeoffs.</text><line style="stroke:#333333;stroke-width:1;" x1="404.7104" x2="698.4487" y1="1509.751" y2="1509.751"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="414.7104" y="1526.3525">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="180.8613" x="457.9995" y="1526.3525">Drafts product/ARCH.md (repo</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="254.6543" x="414.7104" y="1540.4854">map, naming conventions, C4-lite diagram,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="212.2441" x="414.7104" y="1554.6182">tech stack, security notes). Proposes</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="231.9375" x="414.7104" y="1568.751">minimal contracts baseline (schemas.py</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="259.6582" x="414.7104" y="1582.8838">Pydantic models + openapi.yaml endpoints).</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.5996" x="414.7104" y="1597.0166">Runs</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="72.2461" x="447.1069" y="1596.7178">make&#160;check</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="118.3242" x="523.1499" y="1597.0166">to validate contracts</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="273.7383" x="414.7104" y="1611.1494">compile and tests pass. Updates PROGRESS.md</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="240.3516" x="414.7104" y="1625.2822">phase to P2-P3. Logs significant changes</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="126.4453" x="414.7104" y="1639.415">as Decisions (D-###).</text><line style="stroke:#333333;stroke-width:1;" x1="404.7104" x2="698.4487" y1="1646.9463" y2="1646.9463"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="210.5332" x="414.7104" y="1663.5479">-&gt; product/ARCH.md + contracts/*</text><path d="M251.3027,1759.4219 L251.3027,1861.2852 A0,0 0 0 0 251.3027,1861.2852 L439.7095,1861.2852 A0,0 0 0 0 439.7095,1861.2852 L439.7095,1814.3535 L459.7095,1810.3535 L439.7095,1806.3535 L439.7095,1769.4219 L429.7095,1759.4219 L251.3027,1759.4219 A0,0 0 0 0 251.3027,1759.4219" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M429.7095,1759.4219 L429.7095,1769.4219 L439.7095,1769.4219 L429.7095,1759.4219" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="150.6807" x="257.3027" y="1776.9902">Design Feedback Loop</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.2231" x="257.3027" y="1792.3008">Iteration between /plan,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.3218" x="257.3027" y="1807.6113">/explore, and /advise is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167.4067" x="257.3027" y="1822.9219">expected and encouraged.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="162.7729" x="257.3027" y="1838.2324">No ceremony required for</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135.3193" x="257.3027" y="1853.543">draft-phase changes.</text><rect fill="#F1F1F1" height="90.6641" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="183.7402" x="459.7095" y="1765.0215"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="134.9648" x="469.7095" y="1786.623">Iterate: use /explore to</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="152.1445" x="469.7095" y="1800.7559">research gaps, /advise for</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.6074" x="469.7095" y="1814.8887">tradeoff decisions. Agent</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="163.7402" x="469.7095" y="1829.0215">revises ARCH and contracts.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="120.0703" x="469.7095" y="1843.1543">Repeat until aligned.</text><polygon fill="#F1F1F1" points="501.3867,1696.0791,601.7725,1696.0791,613.7725,1715.5117,601.7725,1734.9443,501.3867,1734.9443,489.3867,1715.5117,501.3867,1696.0791" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="555.5796" y="1745.5791">no</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="100.3857" x="501.3867" y="1706.7139">Architecture aligns</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="80.6255" x="501.3867" y="1719.6689">with vision and</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="40.5356" x="501.3867" y="1732.624">stories?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="613.7725" y="1713.1914">yes</text><polygon fill="#F1F1F1" points="551.5796,1881.2852,563.5796,1893.2852,551.5796,1905.2852,539.5796,1893.2852,551.5796,1881.2852" style="stroke:#333333;stroke-width:0.5;"/><path d="M705.6548,1991.5166 L705.6548,2066.4141 L685.6548,2070.4141 L705.6548,2074.4141 L705.6548,2149.3115 A0,0 0 0 0 705.6548,2149.3115 L913.6694,2149.3115 A0,0 0 0 0 913.6694,2149.3115 L913.6694,2001.5166 L903.6694,1991.5166 L705.6548,1991.5166 A0,0 0 0 0 705.6548,1991.5166" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M903.6694,1991.5166 L903.6694,2001.5166 L913.6694,2001.5166 L903.6694,1991.5166" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="150.4521" x="711.6548" y="2009.085">Governance Lockdown</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185.7388" x="711.6548" y="2024.3955">After approval, ARCH.md and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.9399" x="711.6548" y="2039.7061">product/contracts/* become</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="66.7329" x="711.6548" y="2055.0166">read-only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="88.061" x="782.501" y="2055.0166">during P5-P7.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.752" x="711.6548" y="2070.3271">Any changes require a CCR</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.7144" x="711.6548" y="2085.6377">(Contract Change Request)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="137.0776" x="711.6548" y="2100.9482">with human approval.</text><line style="stroke:#333333;stroke-width:1;" x1="705.6548" x2="913.6694" y1="2108.6904" y2="2108.6904"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="711.6548" y="2126.2588">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="764.0229" y="2126.2588">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37.1338" x="861.5356" y="2126.2588">policy</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.4736" x="711.6548" y="2141.5693">+ G1 + G2 evidence</text><rect fill="#D9ECFF" height="290.2578" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="268.1504" x="417.5044" y="1925.2852"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="133.2305" x="427.5044" y="1946.8867">P4: Baseline Approval</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.0723" x="564.5317" y="1946.8867">-- /plan</text><line style="stroke:#333333;stroke-width:1;" x1="417.5044" x2="685.6548" y1="1954.418" y2="1954.418"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="427.5044" y="1971.0195">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="157.752" x="478.0825" y="1971.0195">Open product/PRD.md and</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.8809" x="427.5044" y="1985.1523">product/ARCH.md in your editor.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="173.25" x="427.5044" y="1999.2852">Read every story (S-V###), its</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.6934" x="427.5044" y="2013.418">acceptance criteria, and the</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="197.8477" x="427.5044" y="2027.5508">architecture rules. When satisfied,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="24.9961" x="427.5044" y="2041.6836">type</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="70.7988" x="456.2974" y="2041.6836">"Approved"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.9648" x="530.8931" y="2041.6836">in IDE chat.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.1113" x="427.5044" y="2055.8164">This is the point of no return --</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="224.2734" x="427.5044" y="2069.9492">ARCH and contracts lock to read-only.</text><line style="stroke:#333333;stroke-width:1;" x1="417.5044" x2="685.6548" y1="2077.4805" y2="2077.4805"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="427.5044" y="2094.082">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.5371" x="470.7935" y="2094.082">Finalizes story sequence and</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="204.9668" x="427.5044" y="2108.2148">risk tags. Sets governance policy in</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="248.1504" x="427.5044" y="2122.3477">PROGRESS.md (approval levels, CCR rules).</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="57.8203" x="427.5044" y="2136.4805">Runs final</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="72.2461" x="489.1216" y="2136.1816">make&#160;check</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="60.6152" x="565.1646" y="2136.4805">to confirm</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.6465" x="427.5044" y="2150.6133">ready-to-build state. Records gates</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.9648" x="427.5044" y="2164.7461">G1 (scope approved) and G2 (ready-to-</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="220.6113" x="427.5044" y="2178.8789">build) in PROGRESS.md with evidence.</text><line style="stroke:#333333;stroke-width:1;" x1="417.5044" x2="685.6548" y1="2186.4102" y2="2186.4102"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="195.5566" x="427.5044" y="2203.0117">-&gt; Approved PRD + locked ARCH</text><rect fill="#FFF9D6" height="76.5313" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="238.8711" x="432.144" y="2235.543"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="52.7344" x="442.144" y="2257.1445">Artifacts:</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="47.707" x="498.6753" y="2257.1445">PRD.md</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="105.2227" x="550.1792" y="2257.1445">(approved stories)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="9.5391" x="442.144" y="2271.2773">+</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="57.5801" x="455.48" y="2271.2773">ARCH.md</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="119.291" x="516.8569" y="2271.2773">(locked architecture)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="9.5391" x="442.144" y="2285.4102">+</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="64.125" x="455.48" y="2285.4102">contracts/</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="106.8281" x="523.4019" y="2285.4102">(locked interfaces)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="9.5391" x="442.144" y="2299.543">+</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="86.2148" x="455.48" y="2299.543">PROGRESS.md</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.5234" x="545.4917" y="2299.543">(trackers initialized)</text><rect fill="#FFF2CC" height="86.5313" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="218.0527" x="442.5532" y="2332.0742"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="171.7559" x="452.5532" y="2353.6758">Gate G1 -- Scope Approved</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="192.6094" x="452.5532" y="2367.8086">(PRD stories accepted by Human)</text><line style="stroke:#333333;stroke-width:1;" x1="442.5532" x2="660.606" y1="2375.3398" y2="2375.3398"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="168.3164" x="452.5532" y="2391.9414">Gate G2 -- Ready-to-Build</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="198.0527" x="452.5532" y="2406.0742">(contracts validate + check green)</text><rect fill="#F0F7E6" height="2206.0586" style="stroke:#999999;stroke-width:1.5;" width="842.6782" x="152.1704" y="2440.6055"/><path d="M522.1987,2440.6055 L522.1987,2466.582 L512.1987,2476.582 L152.1704,2476.582" fill="none" style="stroke:#999999;stroke-width:1.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="205.3516" x="155.1704" y="2455.1406">PHASE B: DISCIPLINED BUILD</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="50.3877" x="364.9517" y="2455.1406">(P5-P7)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="360.0283" x="155.1704" y="2471.6289">ARCH and contracts FROZEN -- changes require CCR</text><path d="M701.8052,2575.5479 L701.8052,2650.4453 L681.8052,2654.4453 L701.8052,2658.4453 L701.8052,2733.3428 A0,0 0 0 0 701.8052,2733.3428 L915.6724,2733.3428 A0,0 0 0 0 915.6724,2733.3428 L915.6724,2585.5479 L905.6724,2575.5479 L701.8052,2575.5479 A0,0 0 0 0 701.8052,2575.5479" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M905.6724,2575.5479 L905.6724,2585.5479 L915.6724,2585.5479 L905.6724,2575.5479" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="152.0137" x="707.8052" y="2593.1162">Just-In-Time Planning</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.9775" x="707.8052" y="2608.4268">Tasks are planned per-story,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.8672" x="707.8052" y="2623.7373">not upfront. The agent creates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.7207" x="707.8052" y="2639.0479">minimal atomic tasks right</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.2813" x="707.8052" y="2654.3584">before execution. Each task</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177.7471" x="707.8052" y="2669.6689">maps to the parent story ID.</text><line style="stroke:#333333;stroke-width:1;" x1="701.8052" x2="915.6724" y1="2677.4111" y2="2677.4111"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52.9648" x="707.8052" y="2694.9795">Naming:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="72.4458" x="764.8833" y="2694.9795">T-V###.##</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.3955" x="707.8052" y="2710.29">(e.g., T-V001.01, T-V001.02)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="707.8052" y="2725.6006">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="760.1733" y="2725.6006">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="32.8936" x="857.686" y="2725.6006">tasks</text><rect fill="#DFF7E1" height="233.7266" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="260.4512" x="421.354" y="2537.582"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="130.875" x="431.354" y="2559.1836">P5: JIT Task Planning</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.957" x="566.0259" y="2559.1836">-- /next</text><line style="stroke:#333333;stroke-width:1;" x1="421.354" x2="681.8052" y1="2566.7148" y2="2566.7148"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="431.354" y="2583.3164">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.0957" x="481.9321" y="2583.3164">Type</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="36.123" x="513.8247" y="2583.0176">/next</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.9648" x="553.7446" y="2583.3164">in IDE chat.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="212.3965" x="431.354" y="2597.4492">No additional context needed -- the</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="213.5156" x="431.354" y="2611.582">agent tracks state via PROGRESS.md.</text><line style="stroke:#333333;stroke-width:1;" x1="421.354" x2="681.8052" y1="2619.1133" y2="2619.1133"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="431.354" y="2635.7148">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="178.5176" x="474.6431" y="2635.7148">Reads PRD story sequence and</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="228.4219" x="431.354" y="2649.8477">PROGRESS state. Selects next unstarted</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="215.3555" x="431.354" y="2663.9805">story (S-V###). Decomposes it into a</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="212.2676" x="431.354" y="2678.1133">JIT task checklist (5-15 atomic tasks</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="227.1152" x="431.354" y="2692.2461">T-V###.## with dependencies and risk</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="240.4512" x="431.354" y="2706.3789">tags). Marks story IN_PROGRESS. Updates</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="238.4063" x="431.354" y="2720.5117">PROGRESS.md phase to P5. Presents task</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="90.3867" x="431.354" y="2734.6445">plan for review.</text><line style="stroke:#333333;stroke-width:1;" x1="421.354" x2="681.8052" y1="2742.1758" y2="2742.1758"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.0215" x="431.354" y="2758.7773">-&gt; PROGRESS.md JIT task list</text><polygon fill="#F1F1F1" points="515.3569,2791.3086,587.8022,2791.3086,599.8022,2804.2637,587.8022,2817.2188,515.3569,2817.2188,503.3569,2804.2637,515.3569,2791.3086" style="stroke:#333333;stroke-width:0.5;"/><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="53.3672" x="515.3569" y="2801.9434">HIGH-risk</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="72.4453" x="515.3569" y="2814.8984">tasks in plan?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="485.874" y="2801.9434">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="599.8022" y="2801.9434">no</text><rect fill="#D9ECFF" height="181.3281" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="217.625" x="326.978" y="2827.2188"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="122.0039" x="336.978" y="2848.8203">Human Risk Review</text><line style="stroke:#333333;stroke-width:1;" x1="326.978" x2="544.603" y1="2856.3516" y2="2856.3516"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="336.978" y="2872.9531">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="147.0469" x="387.5562" y="2872.9531">Read the HIGH-risk tasks</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="183.2754" x="336.978" y="2887.0859">in PROGRESS.md. These involve</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.7246" x="336.978" y="2901.2188">destructive operations (DB drops,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.3496" x="336.978" y="2915.3516">deploy scripts) or irreversible</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="164.1445" x="336.978" y="2929.4844">changes. Approve, reject, or</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="136.3828" x="336.978" y="2943.6172">modify each HIGH task.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="28.0957" x="336.978" y="2957.75">Type</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="62.8477" x="368.8706" y="2957.75">"Approve"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="50.9883" x="435.5151" y="2957.75">per task.</text><line style="stroke:#333333;stroke-width:1;" x1="326.978" x2="544.603" y1="2965.2813" y2="2965.2813"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.9863" x="336.978" y="2981.8828">Agent STOPS on HIGH tasks</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="130.6699" x="336.978" y="2996.0156">until explicit approval.</text><rect fill="#DFF7E1" height="48.2656" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="205.5313" x="564.603" y="2827.2188"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="177.627" x="574.603" y="2848.8203">Agent proceeds autonomously</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="185.5313" x="574.603" y="2862.9531">with LOW/MED tasks per policy.</text><polygon fill="#F1F1F1" points="551.5796,3014.5469,563.5796,3026.5469,551.5796,3038.5469,539.5796,3026.5469,551.5796,3014.5469" style="stroke:#333333;stroke-width:0.5;"/><path d="M162.1704,3103.5791 L162.1704,3261.374 A0,0 0 0 0 162.1704,3261.374 L378.9067,3261.374 A0,0 0 0 0 378.9067,3261.374 L378.9067,3186.4766 L398.9067,3182.4766 L378.9067,3178.4766 L378.9067,3113.5791 L368.9067,3103.5791 L162.1704,3103.5791 A0,0 0 0 0 162.1704,3103.5791" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M368.9067,3103.5791 L368.9067,3113.5791 L378.9067,3113.5791 L368.9067,3103.5791" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="162.938" x="168.1704" y="3121.1475">Minimal Implementation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195.7363" x="168.1704" y="3136.458">Agent writes only enough code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="188.6016" x="168.1704" y="3151.7686">to satisfy each task. Tests run</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="105.9551" x="168.1704" y="3167.0791">automatically via</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="78.2666" x="278.2388" y="3166.7554">make&#160;check</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.4102" x="168.1704" y="3182.3896">after every change. Evidence</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="102.7305" x="168.1704" y="3197.7002">logged per task.</text><line style="stroke:#333333;stroke-width:1;" x1="162.1704" x2="378.9067" y1="3205.4424" y2="3205.4424"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.5547" x="168.1704" y="3223.0107">Output: Code + tests</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="10.334" x="168.1704" y="3238.3213">+</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="182.6177" y="3238.3213">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="55.123" x="280.1304" y="3238.3213">evidence</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="51.124" x="168.1704" y="3253.6318">per task</text><rect fill="#DFF7E1" height="247.8594" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="305.3457" x="398.9067" y="3058.5469"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="174.7266" x="408.9067" y="3080.1484">P6: Iterative Implementation</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="106.8223" x="587.4302" y="3080.1484">-- /next + /check</text><line style="stroke:#333333;stroke-width:1;" x1="398.9067" x2="704.2524" y1="3087.6797" y2="3087.6797"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="408.9067" y="3104.2813">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="69.2637" x="459.4849" y="3104.2813">Keep typing</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="36.123" x="532.5454" y="3103.9824">/next</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="11.8594" x="572.4653" y="3104.2813">to</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="222.2754" x="408.9067" y="3118.4141">advance through each task. The agent</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="225.3457" x="408.9067" y="3132.5469">handles one task per /next invocation.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="230.7363" x="408.9067" y="3146.6797">Remove hands from keyboard while the</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="222.6563" x="408.9067" y="3160.8125">agent works. Monitor terminal output.</text><line style="stroke:#333333;stroke-width:1;" x1="398.9067" x2="704.2524" y1="3168.3438" y2="3168.3438"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="408.9067" y="3184.9453">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.9727" x="452.1958" y="3184.9453">For each task (T-V###.##):</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="226.0313" x="408.9067" y="3199.0781">implements minimal code + unit tests,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="25.9219" x="408.9067" y="3213.2109">runs</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="72.2461" x="438.6255" y="3212.9121">make&#160;check</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="81.498" x="514.6685" y="3213.2109">automatically,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="209.25" x="408.9067" y="3227.3438">appends evidence to PROGRESS.md,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="190.4297" x="408.9067" y="3241.4766">marks task DONE if checks pass.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="221.5313" x="408.9067" y="3255.6094">Repeats until all story tasks complete.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.6172" x="408.9067" y="3269.7422">Updates PROGRESS.md phase to P6.</text><line style="stroke:#333333;stroke-width:1;" x1="398.9067" x2="704.2524" y1="3277.2734" y2="3277.2734"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="131.1797" x="408.9067" y="3293.875">-&gt; app/ code + tests/</text><path d="M702.0601,3427.126 L702.0601,3524.9893 L682.0601,3528.9893 L702.0601,3532.9893 L702.0601,3630.8525 A0,0 0 0 0 702.0601,3630.8525 L938.8486,3630.8525 A0,0 0 0 0 938.8486,3630.8525 L938.8486,3437.126 L928.8486,3427.126 L702.0601,3427.126 A0,0 0 0 0 702.0601,3427.126" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M928.8486,3427.126 L928.8486,3437.126 L938.8486,3437.126 L928.8486,3427.126" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="153.2515" x="708.0601" y="3444.6943">No Silent Workarounds</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.0781" x="708.0601" y="3460.0049">During P5-P7, the agent CANNOT</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.0703" x="708.0601" y="3475.3154">modify contracts or ARCH. It</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.8237" x="708.0601" y="3490.626">must STOP and raise a CCR.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.876" x="708.0601" y="3505.9365">This is the core safety gate</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.3354" x="708.0601" y="3521.2471">preventing specification drift.</text><line style="stroke:#333333;stroke-width:1;" x1="702.0601" x2="938.8486" y1="3528.9893" y2="3528.9893"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.6333" x="708.0601" y="3546.5576">APPROVE -&gt; contracts updated,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.7563" x="708.0601" y="3561.8682">task resumes,</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="78.2666" x="799.9297" y="3561.5444">make&#160;check</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="41.5391" x="882.3096" y="3561.8682">re-run</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.4746" x="708.0601" y="3577.1787">REJECT -&gt; code reverted to honor</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="103.6382" x="708.0601" y="3592.4893">original contract</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.5684" x="708.0601" y="3607.7998">DEFER -&gt; task stays BLOCKED,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="159.8911" x="708.0601" y="3623.1104">agent moves to next task</text><rect fill="#FFCDD2" height="304.3906" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="260.9609" x="421.0991" y="3376.7939"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="151.5879" x="431.0991" y="3398.3955">P6.a: Contract Escalation</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="41.1797" x="586.4839" y="3398.3955">-- /ccr</text><line style="stroke:#333333;stroke-width:1;" x1="421.0991" x2="682.0601" y1="3405.9268" y2="3405.9268"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="431.0991" y="3422.5283">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="82.2363" x="481.6772" y="3422.5283">The agent has</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="56.4551" x="567.7104" y="3422.5283">STOPPED</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3.7969" x="624.1655" y="3422.5283">.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="233.0801" x="431.0991" y="3436.6611">Open PROGRESS.md and read CCR-###.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="194.9063" x="431.0991" y="3450.7939">It contains: failing evidence, what</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="190.4883" x="431.0991" y="3464.9268">contract/ARCH rule is violated, a</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="219.791" x="431.0991" y="3479.0596">minimal change proposal, and impact</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188.9648" x="431.0991" y="3493.1924">analysis. You must respond with</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="85.7227" x="431.0991" y="3507.3252">exactly one of:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="6.9434" x="431.0991" y="3521.458">-</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="128.8887" x="441.8394" y="3521.458">"APPROVE CCR-###"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.3828" x="574.5249" y="3521.458">-&gt; apply change</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="6.9434" x="431.0991" y="3535.5908">-</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="116.127" x="441.8394" y="3535.5908">"REJECT CCR-###"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="101.1152" x="561.7632" y="3535.5908">-&gt; revert, recode</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="6.9434" x="431.0991" y="3549.7236">-</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="110.6836" x="441.8394" y="3549.7236">"DEFER CCR-###"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="111.6211" x="556.3198" y="3549.7236">-&gt; block task, skip</text><line style="stroke:#333333;stroke-width:1;" x1="421.0991" x2="682.0601" y1="3557.2549" y2="3557.2549"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="431.0991" y="3573.8564">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="164.8066" x="474.3882" y="3573.8564">Detected mismatch between</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="198.2461" x="431.0991" y="3587.9893">implementation reality and frozen</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="240.9609" x="431.0991" y="3602.1221">contracts/ARCH. Created CCR-### entry.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="224.3262" x="431.0991" y="3616.2549">Marked current task BLOCKED. Cannot</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="223.3887" x="431.0991" y="3630.3877">proceed or work around the mismatch</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.0918" x="431.0991" y="3644.5205">until human decides.</text><line style="stroke:#333333;stroke-width:1;" x1="421.0991" x2="682.0601" y1="3652.0518" y2="3652.0518"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="193.3594" x="431.0991" y="3668.6533">-&gt; PROGRESS.md CCR-### entry</text><polygon fill="#F1F1F1" points="514.3096,3326.4063,588.8496,3326.4063,600.8496,3339.3613,588.8496,3352.3164,514.3096,3352.3164,502.3096,3339.3613,514.3096,3326.4063" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="555.5796" y="3362.9512">yes</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="73.6484" x="514.3096" y="3337.041">Agent detects</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="74.54" x="514.3096" y="3349.9961">contract drift?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="600.8496" y="3337.041">no</text><polygon fill="#F1F1F1" points="551.5796,3701.1846,563.5796,3713.1846,551.5796,3725.1846,539.5796,3713.1846,551.5796,3701.1846" style="stroke:#333333;stroke-width:0.5;"/><path d="M172.2256,3841.7822 L172.2256,3968.9561 A0,0 0 0 0 172.2256,3968.9561 L407.0845,3968.9561 A0,0 0 0 0 407.0845,3968.9561 L407.0845,3909.3691 L427.0845,3905.3691 L407.0845,3901.3691 L407.0845,3851.7822 L397.0845,3841.7822 L172.2256,3841.7822 A0,0 0 0 0 172.2256,3841.7822" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M397.0845,3841.7822 L397.0845,3851.7822 L407.0845,3851.7822 L397.0845,3841.7822" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="140.5688" x="178.2256" y="3859.3506">Context Maintenance</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.9536" x="178.2256" y="3874.6611">/archive only moves operational</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.8589" x="178.2256" y="3889.9717">metadata. Active work and source</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.5923" x="178.2256" y="3905.2822">code are untouched. Restores</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.2813" x="178.2256" y="3920.5928">fast inference performance.</text><line style="stroke:#333333;stroke-width:1;" x1="172.2256" x2="407.0845" y1="3928.335" y2="3928.335"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.5034" x="178.2256" y="3945.9033">Output: Lean PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.0679" x="178.2256" y="3961.2139">+ archive file registered</text><rect fill="#DFF7E1" height="219.5938" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="248.9902" x="427.0845" y="3795.5723"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="135.2578" x="437.0845" y="3817.1738">P6.b: Context Cleanup</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.4727" x="576.1392" y="3817.1738">-- /archive</text><line style="stroke:#333333;stroke-width:1;" x1="427.0845" x2="676.0747" y1="3824.7051" y2="3824.7051"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="437.0845" y="3841.3066">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="138.4805" x="487.6626" y="3841.3066">If the agent's responses</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="192.8145" x="437.0845" y="3855.4395">degrade or it forgets constraints,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="24.9961" x="437.0845" y="3869.5723">type</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="57.7969" x="465.8774" y="3869.2734">/archive</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="116.8945" x="527.4712" y="3869.5723">to sweep completed</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.5117" x="437.0845" y="3883.7051">logs from PROGRESS.md.</text><line style="stroke:#333333;stroke-width:1;" x1="427.0845" x2="676.0747" y1="3891.2363" y2="3891.2363"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="437.0845" y="3907.8379">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="119.502" x="480.3735" y="3907.8379">Moves to archive file</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="228.9902" x="437.0845" y="3921.9707">(process/archive/WIP-YYYYMMDD.md):</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="178.1543" x="437.0845" y="3936.1035">completed tasks, closed CCRs,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="173.2031" x="437.0845" y="3950.2363">resolved Issues, old evidence.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="195.9961" x="437.0845" y="3964.3691">Keeps all active stories and tasks.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="174.4277" x="437.0845" y="3978.502">Source code is never touched.</text><line style="stroke:#333333;stroke-width:1;" x1="427.0845" x2="676.0747" y1="3986.0332" y2="3986.0332"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="174.8965" x="437.0845" y="4002.6348">-&gt; process/archive/WIP-*.md</text><polygon fill="#F1F1F1" points="508.3718,3745.1846,594.7874,3745.1846,606.7874,3758.1396,594.7874,3771.0947,508.3718,3771.0947,496.3718,3758.1396,508.3718,3745.1846" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="555.5796" y="3781.7295">yes</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="86.4155" x="508.3718" y="3755.8193">Context window</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="77.9883" x="508.3718" y="3768.7744">slowing down?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="606.7874" y="3755.8193">no</text><polygon fill="#F1F1F1" points="551.5796,4035.166,563.5796,4047.166,551.5796,4059.166,539.5796,4047.166,551.5796,4035.166" style="stroke:#333333;stroke-width:0.5;"/><path d="M697.7124,4174.8408 L697.7124,4234.4277 L677.7124,4238.4277 L697.7124,4242.4277 L697.7124,4302.0146 A0,0 0 0 0 697.7124,4302.0146 L948.6626,4302.0146 A0,0 0 0 0 948.6626,4302.0146 L948.6626,4184.8408 L938.6626,4174.8408 L697.7124,4174.8408 A0,0 0 0 0 697.7124,4174.8408" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M938.6626,4174.8408 L938.6626,4184.8408 L948.6626,4184.8408 L938.6626,4174.8408" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="126.5151" x="703.7124" y="4192.4092">Physical Validation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="49.061" x="703.7124" y="4207.7197">A green</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="78.2666" x="756.8867" y="4207.396">make&#160;check</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="62.0737" x="839.2666" y="4207.7197">does NOT</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.9502" x="703.7124" y="4223.0303">mean the feature works for humans.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.5166" x="703.7124" y="4238.3408">You MUST interact with the app</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.0591" x="703.7124" y="4253.6514">or API output before approving.</text><line style="stroke:#333333;stroke-width:1;" x1="697.7124" x2="948.6626" y1="4261.3936" y2="4261.3936"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.2549" x="703.7124" y="4278.9619">Output:</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="93.3994" x="756.0806" y="4278.9619">PROGRESS.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.689" x="703.7124" y="4294.2725">S-V### = Done + G3 evidence</text><rect fill="#D9ECFF" height="318.5234" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="252.2656" x="425.4468" y="4079.166"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="127.793" x="435.4468" y="4100.7676">P7: Story Acceptance</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="49.957" x="567.0366" y="4100.7676">-- /next</text><line style="stroke:#333333;stroke-width:1;" x1="425.4468" x2="677.7124" y1="4108.2988" y2="4108.2988"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="435.4468" y="4124.9004">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="175.5527" x="486.0249" y="4124.9004">Agent presents the completed</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="199.6699" x="435.4468" y="4139.0332">story for acceptance. Boot the app</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3.9023" x="435.4468" y="4153.166">(</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="57.7969" x="439.3491" y="4152.8672">make&#160;run</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="137.9531" x="497.146" y="4153.166">) and physically test the</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="232.2656" x="435.4468" y="4167.2988">feature. Cross-reference results against</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="177.123" x="435.4468" y="4181.4316">acceptance criteria in PRD.md.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="82.5586" x="435.4468" y="4195.5645">Respond with:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="6.9434" x="435.4468" y="4209.6973">-</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="40.7461" x="446.187" y="4209.6973">"PASS"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.1074" x="490.73" y="4209.6973">-&gt; story is Done</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="6.9434" x="435.4468" y="4223.8301">-</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="89.2031" x="446.187" y="4223.8301">"FAIL + notes"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="101.8711" x="539.187" y="4223.8301">-&gt; agent patches</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.7656" x="443.0405" y="4237.9629">(e.g., "FAIL. Pagination returns</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.9004" x="443.0405" y="4252.0957">wrong cursor after last page.")</text><line style="stroke:#333333;stroke-width:1;" x1="425.4468" x2="677.7124" y1="4259.627" y2="4259.627"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="435.4468" y="4276.2285">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.416" x="478.7358" y="4276.2285">Summarizes what was built,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="218.5781" x="435.4468" y="4290.3613">tests passing, and acceptance criteria</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="197.7305" x="435.4468" y="4304.4941">coverage. If FAIL: applies targeted</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="80.0977" x="435.4468" y="4318.627">fixes, re-runs</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="72.2461" x="519.3413" y="4318.3281">make&#160;check</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="33.4688" x="591.5874" y="4318.627">, asks</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.3223" x="435.4468" y="4332.7598">for re-validation. If PASS: marks</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="207.3691" x="435.4468" y="4346.8926">story DONE, records G3 evidence in</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="224.9766" x="435.4468" y="4361.0254">PROGRESS.md, advances to next story.</text><line style="stroke:#333333;stroke-width:1;" x1="425.4468" x2="677.7124" y1="4368.5566" y2="4368.5566"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="174.0996" x="435.4468" y="4385.1582">-&gt; PROGRESS.md story status</text><rect fill="#FFF2CC" height="62.3984" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="217.8594" x="442.6499" y="4417.6895"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="166.6816" x="452.6499" y="4439.291">Gate G3 -- Story Delivered</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="186.1113" x="452.6499" y="4453.4238">(acceptance met + check green)</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="197.8594" x="452.6499" y="4467.5566">Repeats for each story in backlog.</text><polygon fill="#F1F1F1" points="551.5796,2493.582,563.5796,2505.582,551.5796,2517.582,539.5796,2505.582,551.5796,2493.582" style="stroke:#333333;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="509.2097,4500.0879,593.9495,4500.0879,605.9495,4513.043,593.9495,4525.998,509.2097,4525.998,497.2097,4513.043,509.2097,4500.0879" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="555.5796" y="4536.6328">no</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="66.2363" x="509.2097" y="4510.7227">More stories</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="84.7397" x="509.2097" y="4523.6777">in PRD backlog?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="605.9495" y="4510.7227">yes</text><rect fill="#FFF9D6" height="76.53