 font-weight="bold" lengthAdjust="spacing" textLength="104.584" x="430.6685" y="5036.7461">P11: Deployment</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="65.1563" x="539.0493" y="5036.7461">-- /release</text><line style="stroke:#333333;stroke-width:1;" x1="420.6685" x2="682.4907" y1="5044.2773" y2="5044.2773"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="46.7813" x="430.6685" y="5060.8789">Human:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="172.9512" x="481.2466" y="5060.8789">Deploy to staging/production</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="220.9277" x="430.6685" y="5075.0117">using your preferred platform (Vercel,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="208.7871" x="430.6685" y="5089.1445">Fly.io, AWS, etc.). Follow the agent's</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="241.8223" x="430.6685" y="5103.2773">deploy runbook. Run smoke tests against</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="200.5371" x="430.6685" y="5117.4102">the live environment. Report back:</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="101.1387" x="430.6685" y="5131.543">"DEPLOYED_OK"</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="12.2813" x="535.604" y="5131.543">or</text><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="84.2109" x="551.6821" y="5131.543">"FAIL + logs."</text><line style="stroke:#333333;stroke-width:1;" x1="420.6685" x2="682.4907" y1="5139.0742" y2="5139.0742"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="39.4922" x="430.6685" y="5155.6758">Agent:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="176.25" x="473.9575" y="5155.6758">Provides deployment checklist</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="229.4648" x="430.6685" y="5169.8086">and expected verification steps. If FAIL:</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="235.1719" x="430.6685" y="5183.9414">diagnoses from logs provided, proposes</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="132.8145" x="430.6685" y="5198.0742">targeted fixes, re-runs</text><text fill="#111111" font-family="monospace" font-size="12" lengthAdjust="spacing" textLength="72.2461" x="567.2798" y="5197.7754">make&#160;check</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="3.7969" x="639.5259" y="5198.0742">.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="228.9082" x="430.6685" y="5212.207">If OK: records G5 in PROGRESS.md with</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="237.8438" x="430.6685" y="5226.3398">deployment evidence and smoke results.</text><line style="stroke:#333333;stroke-width:1;" x1="420.6685" x2="682.4907" y1="5233.8711" y2="5233.8711"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="115.5645" x="430.6685" y="5250.4727">-&gt; Live deployment</text><rect fill="#F1F1F1" height="76.5313" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="197.6035" x="452.7778" y="5333.3916"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="135.3926" x="462.7778" y="5354.9932">Report failure to agent.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7754" x="462.7778" y="5369.126">Agent diagnoses from logs,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="158.8008" x="462.7778" y="5383.2588">fixes code, re-runs checks.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="177.6035" x="462.7778" y="5397.3916">Re-run /release -&gt; re-deploy.</text><polygon fill="#F1F1F1" points="521.292,5283.0039,581.8672,5283.0039,593.8672,5295.959,581.8672,5308.9141,521.292,5308.9141,509.292,5295.959,521.292,5283.0039" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.5835" x="555.5796" y="5319.5488">no</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="36.9746" x="521.292" y="5293.6387">Deploy</text><text fill="#111111" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="60.5752" x="521.292" y="5306.5938">succeeded?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.4829" x="593.8672" y="5293.6387">yes</text><polygon fill="#F1F1F1" points="551.5796,5429.9229,563.5796,5441.9229,551.5796,5453.9229,539.5796,5441.9229,551.5796,5429.9229" style="stroke:#333333;stroke-width:0.5;"/><rect fill="#FFF2CC" height="48.2656" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="236.0469" x="433.5562" y="5473.9229"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="127.0195" x="443.5562" y="5495.5244">Gate G5 -- Released</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="216.0469" x="443.5562" y="5509.6572">(deployed + smoke OK + notes 