openapi: 3.1.0
info:
  title: Job Engine API (Starter Contract)
  version: 0.1.0
  summary: Starter executable contracts for a job-posting ingestion + search API.
  description: |
    This is a **starter** OpenAPI contract intended to be refined once PRD scope is specific.
    Conventions:
      - JSON field names are **snake_case**.
      - All timestamps are ISO-8601 UTC (RFC3339) in `date-time` format.
      - Pagination is cursor-based (`cursor`, `limit`, `next_cursor`).
servers:
  - url: http://localhost:8000
tags:
  - name: health
  - name: meta
  - name: jobs
  - name: ingest

paths:
  /health:
    get:
      tags: [health]
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [ok]
                  time_utc:
                    type: string
                    format: date-time
                required: [status, time_utc]

  /meta/version:
    get:
      tags: [meta]
      operationId: getVersion
      summary: Build/version metadata
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"

  /jobs:
    get:
      tags: [jobs]
      operationId: listJobs
      summary: List/search job postings
      description: |
        Returns job postings filtered by query params. Cursor pagination is preferred for stability.
      parameters:
        - name: q
          in: query
          description: Full-text search query (title/company/description).
          required: false
          schema: { type: string, minLength: 1 }
        - name: country_code
          in: query
          description: ISO 3166-1 alpha-2 country code (e.g., SE, NO).
          required: false
          schema: { type: string, minLength: 2, maxLength: 2 }
        - name: source
          in: query
          description: Source identifier (e.g., "arbetsformedlingen", "nav", "eures").
          required: false
          schema: { type: string, minLength: 1 }
        - name: updated_after
          in: query
          description: Only return postings updated after this timestamp (UTC).
          required: false
          schema: { type: string, format: date-time }
        - name: cursor
          in: query
          description: Cursor from a previous response's `page_info.next_cursor`.
          required: false
          schema: { type: string }
        - name: limit
          in: query
          description: Max items to return (default 50, max 200).
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{job_id}:
    get:
      tags: [jobs]
      operationId: getJobById
      summary: Get a job posting by internal ID
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPosting"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ingest/jobs:
    post:
      tags: [ingest]
      operationId: ingestJobsBatch
      summary: Upsert a batch of job postings from a source (internal/admin)
      description: |
        Intended for ingestion pipelines. The server should canonicalize by `(source, external_id)` when present,
        otherwise derive a `dedupe_key` using fuzzy matching (implementation detail).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestJobsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobsResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    VersionInfo:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
        build_sha:
          type: string
        build_time_utc:
          type: string
          format: date-time
      required: [version]

    ErrorDetail:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
      required: [message]

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
        trace_id:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
      required: [code, message]

    PageInfo:
      type: object
      additionalProperties: false
      properties:
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required: [has_more]

    Location:
      type: object
      additionalProperties: false
      properties:
        country_code:
          type: string
          minLength: 2
          maxLength: 2
        region:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        raw:
          type: string
          nullable: true
      required: [country_code]

    Salary:
      type: object
      additionalProperties: false
      properties:
        min_amount:
          type: number
          nullable: true
        max_amount:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        period:
          type: string
          nullable: true
          description: 'Examples: "hour", "month", "year".'
      required: []

    TaxonomyTag:
      type: object
      additionalProperties: false
      properties:
        taxonomy:
          type: string
          description: 'Examples: "ESCO", "SSYK", "ISCO".'
        code:
          type: string
        label:
          type: string
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
      required: [taxonomy, code]

    SkillTag:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        taxonomy:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
      required: [name]

    JobPosting:
      type: object
      additionalProperties: false
      properties:
        job_id:
          type: string
          description: Internal unique identifier (server-generated).
        source:
          type: string
          description: Source identifier (e.g., "arbetsformedlingen", "nav", "eures").
        external_id:
          type: string
          nullable: true
          description: Provider's external ID, if available.
        title:
          type: string
        description:
          type: string
          nullable: true
        company_name:
          type: string
          nullable: true
        company_id:
          type: string
          nullable: true
          description: Optional normalized company identifier.
        location:
          $ref: "#/components/schemas/Location"
        employment_type:
          type: string
          nullable: true
          description: 'Examples: "full_time", "part_time", "contract", "internship".'
        remote_type:
          type: string
          nullable: true
          description: 'Examples: "on_site", "hybrid", "remote".'
        seniority:
          type: string
          nullable: true
          description: 'Examples: "junior", "mid", "senior", "lead".'
        salary:
          $ref: "#/components/schemas/Salary"
        apply_url:
          type: string
          format: uri
          nullable: true
        apply_urls:
          type: array
          items:
            type: string
            format: uri
          nullable: true
        posted_at_utc:
          type: string
          format: date-time
          nullable: true
        expires_at_utc:
          type: string
          format: date-time
          nullable: true
        ingested_at_utc:
          type: string
          format: date-time
        updated_at_utc:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, expired, removed]
        occupations:
          type: array
          items:
            $ref: "#/components/schemas/TaxonomyTag"
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillTag"
          nullable: true
        dedupe_key:
          type: string
          nullable: true
          description: Optional derived key used when external_id is missing (implementation detail).
      required: [job_id, source, title, location, ingested_at_utc, updated_at_utc, status]

    JobListResponse:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/JobPosting"
        page_info:
          $ref: "#/components/schemas/PageInfo"
      required: [items, page_info]

    JobUpsert:
      type: object
      additionalProperties: false
      properties:
        source:
          type: string
        external_id:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        company_name:
          type: string
          nullable: true
        location:
          $ref: "#/components/schemas/Location"
        employment_type:
          type: string
          nullable: true
        remote_type:
          type: string
          nullable: true
        seniority:
          type: string
          nullable: true
        salary:
          $ref: "#/components/schemas/Salary"
        apply_url:
          type: string
          format: uri
          nullable: true
        apply_urls:
          type: array
          items:
            type: string
            format: uri
          nullable: true
        posted_at_utc:
          type: string
          format: date-time
          nullable: true
        expires_at_utc:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, expired, removed]
          default: active
        occupations:
          type: array
          items:
            $ref: "#/components/schemas/TaxonomyTag"
          nullable: true
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillTag"
          nullable: true
      required: [source, title, location]

    IngestJobsRequest:
      type: object
      additionalProperties: false
      properties:
        source:
          type: string
        fetched_at_utc:
          type: string
          format: date-time
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/JobUpsert"
          minItems: 1
      required: [source, fetched_at_utc, jobs]

    IngestJobsResponse:
      type: object
      additionalProperties: false
      properties:
        source:
          type: string
        fetched_at_utc:
          type: string
          format: date-time
        received_count:
          type: integer
        created_count:
          type: integer
        updated_count:
          type: integer
        skipped_count:
          type: integer
        warnings:
          type: array
          items:
            type: string
          nullable: true
      required: [source, fetched_at_utc, received_count, created_count, updated_count, skipped_count]
