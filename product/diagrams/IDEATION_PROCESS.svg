">Every endpoint traces to</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.6631" x="736.6865" y="2758.7412">&gt;= 1 story in PRD.md S4</text><rect fill="#D9ECFF" height="153.0625" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="233.7266" x="476.96" y="2634.0205"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="110.1914" x="486.96" y="2655.6221">H3.3b: API Design</text><line style="stroke:#333333;stroke-width:1;" x1="476.96" x2="710.6865" y1="2663.1533" y2="2663.1533"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="163.7988" x="486.96" y="2679.7549">Define HTTP API: endpoints,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="204.8848" x="486.96" y="2693.8877">methods, schemas, error envelope,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="188.1621" x="486.96" y="2708.0205">cursor pagination, auth scheme.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="206.6074" x="486.96" y="2722.1533">OpenAPI spec written BEFORE code.</text><rect fill="#111111" height="3.5" width="3.5" x="495.96" y="2728.8174"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="150.6563" x="502.96" y="2736.2861">Schemas from H3.2b feed</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="213.7266" x="486.96" y="2750.4189">directly into OpenAPI components.**</text><line style="stroke:#333333;stroke-width:1;" x1="476.96" x2="710.6865" y1="2757.9502" y2="2757.9502"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="158.3848" x="486.96" y="2774.5518">-&gt; contracts/openapi.yaml</text><path d="M990.3462,2458.9023 L99