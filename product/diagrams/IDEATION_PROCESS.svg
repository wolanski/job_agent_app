" y="2563.0234">ARCH.md S4</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="64.1113" x="1135.4932" y="2563.0234">(topology)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="10.334" x="996.3462" y="2578.334">+</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="82.6655" x="1010.7935" y="2578.334">ARCH.md S6</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="76.9082" x="1097.5723" y="2578.334">(extensions)</text><rect fill="#D9ECFF" height="138.9297" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="212.2285" x="1234.6045" y="2453.0244"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="157.3418" x="1244.6045" y="2474.626">H3.2c: Cloud Architecture</text><line style="stroke:#333333;stroke-width:1;" x1="1234.6045" x2="1446.833" y1="2482.1572" y2="2482.1572"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="171.1992" x="1244.6045" y="2498.7588">Design deployment: compute</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="192.2285" x="1244.6045" y="2512.8916">(Fargate, Cloud Run), networking</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.9336" x="1244.6045" y="2527.0244">(VPC, ALB, CDN), data (RDS,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="155.3672" x="1244.6045" y="2541.1572">ElastiCache), observability,</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.1133" x="1244.6045" y="2555.29">CI/CD pipeline, IaC strategy.</text><line style="stroke:#333333;stroke-width:1;" x1="1234.6045" x2="1446.833" y1="25