" y="432.9023">H1.1: Vision &amp; Value</text><line style="stroke:#333333;stroke-width:1;" x1="644.6421" x2="835.1909" y1="440.4336" y2="440.4336"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="170.5488" x="654.6421" y="457.0352">Define business model, value</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.0273" x="654.6421" y="471.168">proposition, and market fit.</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.5078" x="654.6421" y="485.3008">Identify core problem, target</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="145.0078" x="654.6421" y="499.4336">user, and why it matters.</text><line style="stroke:#333333;stroke-width:1;" x1="644.6421" x2="835.1909" y1="506.9648" y2="506.9648"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="112.998" x="654.6421" y="523.5664">-&gt; lean_canvas.pdf</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.7012" x="654.6421" y="537.6992">-&gt; wardley_map.png</text><path d="M868.855,591.4189 L868.855,635.6953 L848.855,639.6953 L868.855,643.6953 L868.855,687.9717 A0,0 0 0 0 868.855,687.9717 L1052.8311,687.9717 A0,0 0 0 0 1052.8311,687.9717 L1052.8311,601.4189 L1042.8311,591.4189 L868.855,591.4189 A0,0 0 0 0 868.855,591.4189" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><path d="M1042.8311,591.4189 L1042.8311,601.4189 L1052.8311,601.4189 L1042.8311,591.4189" fill="#FFF9D6" style="stroke:#333333;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="95.418" x="874.855" y="608.9873">User Personas</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="54.1646" x="974.3862" y="608.9873"