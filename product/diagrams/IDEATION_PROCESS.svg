" font-size="13" lengthAdjust="spacing" textLength="49.7021" x="1155.7412" y="2751.0859">Security</text><rect fill="#D9ECFF" height="167.1953" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:0.5;" width="200.5508" x="1240.4434" y="2626.9541"/><text fill="#111111" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="179.6426" x="1250.4434" y="2648.5557">H3.3c: Security &amp; Compliance</text><line style="stroke:#333333;stroke-width:1;" x1="1240.4434" x2="1440.9941" y1="2656.0869" y2="2656.0869"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="156.6445" x="1250.4434" y="2672.6885">Define auth (JWT, OAuth2),</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="162.5684" x="1250.4434" y="2686.8213">authorization (RBAC/ABAC),</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="133.4121" x="1250.4434" y="2700.9541">data classification (PII),</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="163.084" x="1250.4434" y="2715.0869">secrets management, threat</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.3906" x="1250.4434" y="2729.2197">model (top 3 attack vectors).</text><rect fill="#111111" height="3.5" width="3.5" x="1259.4434" y="2735.8838"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="158.7422" x="1266.4434" y="2743.3525">Cloud topology from H3.2c</text><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="180.5508" x="1250.4434" y="2757.4854">shapes secrets management.**</text><line style="stroke:#333333;stroke-width:1;" x1="1240.4434" x2="1440.9941" y1="2765.0166" y2="2765.0166"/><text fill="#111111" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="157